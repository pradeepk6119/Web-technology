<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login Form</title>
    <style>
        *{
            padding: 0px;
            margin: 0px;
            background:linear-gradient(40deg,rgb(187, 253, 159));
        }
        button {
            background-color: rgb(34, 172, 31);
            color: rgb(47, 60, 1);
        }
        button:hover {
            border: 1px solid rgb(255, 238, 2);
            color: rgb(240, 229, 8);
            background-color: transparent;
        }
    </style>
</head>
<body>
    <div id="container">
        <form action="">
            <h1>LOGIN FORM</h1>
                <label for="">username</label>
                <br>
                <input type="text" placeholder="username">
                <br>
                <label for="">password</label>
                <br>
                <input type="password" placeholder="password">
                <br>
                <button>Login</button>
        </form>
    </div>
</body>
</html>
