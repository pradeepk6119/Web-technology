<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        body {
            height: 100vh;
            width: 100vw;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        #face {
            height: 300px;
            width: 300px;
            border-radius: 50%;
            /*background: linear-gradient(to right, red, orange);*/
            background-color: #FFD700;
            box-shadow: 0px 5px 10px rgb(104, 104, 7);
            position: relative;
        }
        #eye-container {
            height: 70px;
            width: 100%;
            position: absolute;
            display: flex;
            align-items: center;
            justify-content: space-evenly;
            top: 60px;
        }
        #eye-container .eyes {
            height: 100%;
            width: 60px;
            border-radius: 50%;
            background-color: white;
        }
        #eye-container .eyes .eyeball {
            height: 51%;
            width: 50%;
            border-radius: 50%;
            background-color: black;
            position: relative;
            top: 35px;
            left: 14px;
        }
        #mouth{
            height: 3px;
            width: 100px;
            background-color: black;
            position: absolute;
            bottom: 90px;
            left: 100px;
        }
       /* @keyframes shock{
            50%{
                height: 20px;
                width: 20px;
                border-radius: 50px;
                left: 140px;
            }
            70%,80%,90%,100%{
                
            }
        }*/
    </style>
</head>
<body>
    <div id="face">
        <div id="eye-container">
            <div class="eyes">
                <div class="eyeball"></div>
            </div>
            <div class="eyes">
                <div class="eyeball"></div>
            </div>
        </div>
        <div id="mouth">

        </div>
    </div>
</body>
</html>
