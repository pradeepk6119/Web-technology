<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        body {
            height: 100vh;
            width: 100vw;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .img-container {
            height: 150px;
            width: 150px;
            border: 1px solid;
            box-shadow: 0px 0px 1px black;
            position: absolute;
            display: flex;
            align-items: center;
            justify-content: center;
            background-color: white;
            position: absolute;
        }
        .img-container img{
            height: 80%;
            width: 80%;
            border: 1px solid;
        }

        .img1 {
            top: 60px;
            left: 200px;
        }

        .img2 {
            top: 160px;
            left: 300px;
        }

        .img3 {
            top: 260px;
            left: 400px;
        }
    </style>
</head>

<body>
    <div class="img-container img1">
        <img src="https://images.squarespace-cdn.com/content/v1/6598c8e83ff0af0197ff19f9/1722366168972-VQIVJ6248S0C56CSE8S8/2020-Bugatti-Divo.jpg" alt="">
    </div>
    <div class="img-container img2">
        <img src="https://www.carandbike.com/_next/image?url=https%3A%2F%2Fimages.carandbike.com%2Fcar-images%2Forig%2Flamborghini%2Frevuelto%2Flamborghini-revuelto.jpg%3Fv%3D33&w=1920&q=90" alt="">
    </div>
    <div class="img-container img3">
        <img src="https://m.media-amazon.com/images/I/61hpxZXvYPL._AC_UF1000,1000_QL80_.jpg" alt="">
    </div>
</body>

</html>
